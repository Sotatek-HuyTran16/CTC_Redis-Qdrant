apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: harbor-alerts
  namespace: dev-monitoring
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:

  # ==============================
  # Harbor Alerts
  # ==============================
  - name: harbor
    rules:

    - alert: HarborDown
      expr: up{job="harbor"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Harbor instance down
        description: Harbor {{ $labels.instance }} is not reachable.

    - alert: HarborCoreUnhealthy
      expr: harbor_health_status{component="core"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: Harbor core unhealthy
        description: Harbor core component is unhealthy.

    - alert: HarborHighRequestLatency
      expr: histogram_quantile(
              0.95,
              sum(rate(harbor_http_request_duration_seconds_bucket[5m]))
              by (le, instance)
            ) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Harbor high request latency
        description: 95th percentile latency > 2s on {{ $labels.instance }}.

    - alert: HarborHighErrorRate
      expr: rate(harbor_http_requests_total{status=~"5.."}[5m]) > 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Harbor high 5xx error rate
        description: Harbor returning high 5xx errors.

    - alert: HarborRegistryDiskFullSoon
      expr: (
              node_filesystem_avail_bytes{mountpoint="/storage"}
              /
              node_filesystem_size_bytes{mountpoint="/storage"}
            ) < 0.15
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Harbor registry disk almost full
        description: Less than 15% disk space remaining on registry storage.