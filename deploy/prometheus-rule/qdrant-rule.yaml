apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: qdrant-alerts
  namespace: dev-monitoring
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
  - name: qdrant-cluster
    rules:

    - alert: QdrantInstanceDown
      expr: up{job="qdrant"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Qdrant instance down
        description: Qdrant {{ $labels.instance }} is not reachable.

    - alert: QdrantHighMemoryUsage
      expr: process_resident_memory_bytes{job="qdrant"}
            /
            node_memory_MemTotal_bytes
            * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Qdrant memory usage high
        description: Memory usage above 85% on {{ $labels.instance }}.

    - alert: QdrantHighCPUUsage
      expr: rate(process_cpu_seconds_total{job="qdrant"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Qdrant CPU usage high
        description: CPU usage above 80% on {{ $labels.instance }}.

    - alert: QdrantCollectionLoadFailure
      expr: increase(qdrant_collections_load_failures_total[5m]) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: Qdrant collection load failure
        description: Collection failed to load in last 5 minutes.

    - alert: QdrantHighRequestLatency
      expr: histogram_quantile(
              0.95,
              sum(rate(qdrant_http_request_duration_seconds_bucket[5m]))
              by (le, instance)
            ) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Qdrant high request latency
        description: 95th percentile latency > 1s on {{ $labels.instance }}.

    - alert: QdrantHighFailedRequests
      expr: increase(qdrant_http_requests_total{status!~"2.."}[5m]) > 50
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Qdrant high failed requests
        description: High number of non-2xx responses.

    - alert: QdrantShardReplicaDown
      expr: qdrant_cluster_replica_state{state!="Active"} > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: Qdrant replica not active
        description: Some replicas are not in Active state.

    - alert: QdrantDiskSpaceLow
      expr: (node_filesystem_avail_bytes{mountpoint="/qdrant/storage"}
            /
            node_filesystem_size_bytes{mountpoint="/qdrant/storage"})
            * 100 < 10
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Qdrant disk space low
        description: Less than 10% disk space remaining.