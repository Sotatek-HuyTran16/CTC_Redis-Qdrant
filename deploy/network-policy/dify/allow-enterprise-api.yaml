########################
### Egress
########################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-enterprise-api-to-other-workloads
  namespace: dev-dify
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dev-dify-enterprise-api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/role: dify-app
    ports:
    - protocol: TCP
      port: 8083 # audit
    - protocol: TCP
      port: 9084 # plugin-manager
    - protocol: UDP
      port: 9084 # plugin-manager
    - protocol: TCP
      port: 8084 # plugin-manager
---

