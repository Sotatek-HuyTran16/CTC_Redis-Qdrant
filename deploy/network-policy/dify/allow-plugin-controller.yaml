########################
### Egress
########################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-plugin-controller-to-other-workloads
  namespace: dev-dify
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dev-dify-plugin-controller
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/role: dify-app
    ports:
    - protocol: TCP
      port: 5004 # plugin-connector
    - protocol: TCP
      port: 5003 # plugin-daemon
    - protocol: TCP
      port: 5002 # plugin-daemon
    - protocol: TCP
      port: 8084 # plugin-manager